<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFT — Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <main class="main-content">
    <div class="page-header">
      <div class="page-title">Dashboard</div>
      <div class="page-sub" id="date-sub"></div>
    </div>

    <!-- STAT CARDS -->
    <div class="stats-grid" style="grid-template-columns:repeat(4,minmax(0,1fr))">
      <div class="stat-card income">
        <div class="stat-label">This Month — Income</div>
        <div class="stat-value" id="stat-month-income">—</div>
      </div>
      <div class="stat-card expense">
        <div class="stat-label">This Month — Expense</div>
        <div class="stat-value" id="stat-month-expense">—</div>
      </div>
      <div class="stat-card net-pos" id="stat-month-net-card">
        <div class="stat-label">This Month — Net</div>
        <div class="stat-value" id="stat-month-net">—</div>
      </div>
      <div class="stat-card net-pos" id="stat-alltime-net-card">
        <div class="stat-label">All Time — Net</div>
        <div class="stat-value" id="stat-alltime-net">—</div>
      </div>
    </div>

    <!-- CHARTS ROW -->
    <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:12px;margin-bottom:1.5rem;">
      <div class="card">
        <div class="section-header">
          <div class="section-title">Monthly Overview</div>
          <span style="font-size:12px;color:var(--text3);font-family:var(--mono)">last 6 months</span>
        </div>
        <div class="chart-container">
          <canvas id="monthly-chart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="section-header">
          <div class="section-title">By Category</div>
          <!-- Toggle -->
          <div style="display:flex;gap:4px;">
            <button class="btn btn-sm donut-toggle active" id="toggle-expense" onclick="switchDonut('expense')">Expense</button>
            <button class="btn btn-sm donut-toggle" id="toggle-income" onclick="switchDonut('income')">Income</button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="cat-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- RECENT TRANSACTIONS -->
    <div class="card">
      <div class="section-header">
        <div class="section-title">Recent Transactions</div>
        <a href="transactions.html" class="btn btn-sm">View all</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th>
            </tr>
          </thead>
          <tbody id="recent-tbody">
            <tr><td colspan="5"><div class="loading"><div class="spinner"></div> loading...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="app.js"></script>
<script>
const user = requireAuth();
document.getElementById('sidebar').innerHTML = renderSidebar('dashboard');
document.getElementById('date-sub').textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

const CHART_DEFAULTS = {
  color: '#e8eaf0',
  grid: 'rgba(255,255,255,0.05)',
  font: "'DM Mono', monospace"
};
const catColors = ['#4ade80','#f87171','#60a5fa','#fbbf24','#a78bfa','#34d399','#fb923c'];

let catChart = null;
let allCatData = [];
let currentDonut = 'expense';

function netDisplay(netStr, cardId, valueId) {
  const net = parseFloat(netStr);
  const arrow = net >= 0 ? ' ↑' : ' ↓';
  const color = net >= 0 ? 'var(--accent)' : 'var(--red)';
  document.getElementById(valueId).innerHTML = `<span style="color:${color}">₹${formatRupees(netStr)}${arrow}</span>`;
  document.getElementById(cardId).className = 'stat-card ' + (net >= 0 ? 'net-pos' : 'net-neg');
}

function buildDonut(type) {
  const filtered = allCatData.filter(c => parseFloat(c[type]) > 0);
  if (catChart) { catChart.destroy(); catChart = null; }

  if (!filtered.length) {
    document.getElementById('cat-chart').style.display = 'none';
    return;
  }
  document.getElementById('cat-chart').style.display = 'block';

  catChart = new Chart(document.getElementById('cat-chart'), {
    type: 'doughnut',
    data: {
      labels: filtered.map(c => c.category),
      datasets: [{ data: filtered.map(c => parseFloat(c[type]).toFixed(2)), backgroundColor: catColors, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: CHART_DEFAULTS.color, font: { family: CHART_DEFAULTS.font, size: 11 }, boxWidth: 10, padding: 8 } }
      },
      cutout: '65%'
    }
  });
}

function switchDonut(type) {
  currentDonut = type;
  document.getElementById('toggle-expense').classList.toggle('active', type === 'expense');
  document.getElementById('toggle-income').classList.toggle('active', type === 'income');
  buildDonut(type);
}

async function loadDashboard() {
  try {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const monthStart = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
    const monthEnd = new Date(now.getFullYear(), now.getMonth()+1, 0);
    const monthEndStr = `${monthEnd.getFullYear()}-${pad(monthEnd.getMonth()+1)}-${pad(monthEnd.getDate())}`;

    const [allTime, thisMonth, monthly, catData, txData] = await Promise.all([
      apiFetch('/api/analysis'),
      apiFetch(`/api/analysis?start_date=${monthStart}&end_date=${monthEndStr}`),
      apiFetch('/api/analysis/monthly'),
      apiFetch('/api/analysis/categories'),
      apiFetch('/api/transactions')
    ]);

    // Stat cards
    document.getElementById('stat-month-income').textContent = '₹' + formatRupees(thisMonth.total_income);
    document.getElementById('stat-month-expense').textContent = '₹' + formatRupees(thisMonth.total_expense);
    netDisplay(thisMonth.net, 'stat-month-net-card', 'stat-month-net');
    netDisplay(allTime.net, 'stat-alltime-net-card', 'stat-alltime-net');

    // Monthly bar chart — last 6 months
    const last6 = monthly.slice(0, 6).reverse();
    const MONTH_NAMES = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const monthLabels = last6.map(m => MONTH_NAMES[parseInt(m.month)] + ' ' + m.year.slice(2));

    new Chart(document.getElementById('monthly-chart'), {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [
          { label: 'Income', data: last6.map(m => parseFloat(m.income).toFixed(2)), backgroundColor: 'rgba(74,222,128,0.7)', borderRadius: 4 },
          { label: 'Expense', data: last6.map(m => parseFloat(m.expense).toFixed(2)), backgroundColor: 'rgba(248,113,113,0.7)', borderRadius: 4 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: CHART_DEFAULTS.color, font: { family: CHART_DEFAULTS.font, size: 11 }, boxWidth: 10 } } },
        scales: {
          x: { ticks: { color: CHART_DEFAULTS.color, font: { family: CHART_DEFAULTS.font, size: 10 } }, grid: { color: CHART_DEFAULTS.grid } },
          y: { ticks: { color: CHART_DEFAULTS.color, font: { family: CHART_DEFAULTS.font, size: 10 }, callback: v => '₹' + v }, grid: { color: CHART_DEFAULTS.grid } }
        }
      }
    });

    // Donut chart — store data, build expense view by default
    allCatData = catData;
    buildDonut('expense');

    // Recent transactions
    const tbody = document.getElementById('recent-tbody');
    const txs = Array.isArray(txData) ? txData : txData.transactions || [];
    const recent = txs.slice(0, 5);
    if (!recent.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">no transactions yet</div></td></tr>';
      return;
    }
    tbody.innerHTML = recent.map(t => {
      const isDebit = t.type === 'db';
      const amountDisplay = isDebit ? `-₹${formatRupees(t.amount)}` : `₹${formatRupees(t.amount)}`;
      return `
      <tr>
        <td style="font-family:var(--mono);font-size:12px">${t.date}</td>
        <td class="primary">${t.description || '—'}</td>
        <td>${t.category}</td>
        <td><span class="badge badge-${t.type}">${t.type === 'cr' ? 'Credit' : 'Debit'}</span></td>
        <td style="font-family:var(--mono);font-weight:500;color:${isDebit ? 'var(--red)' : 'var(--accent)'}">${amountDisplay}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    if (e.status === 401) { clearUser(); window.location.href = 'index.html'; }
  }
}

// Toggle button styles
const style = document.createElement('style');
style.textContent = `.donut-toggle.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }`;
document.head.appendChild(style);

loadDashboard();
</script>
</body>
</html>
