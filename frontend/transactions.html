<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFT — Transactions</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <main class="main-content">

    <!-- PAGE HEADER with range buttons on the right -->
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;">
      <div>
        <div class="page-title">Transactions</div>
        <div class="page-sub" id="tx-count-sub">loading...</div>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;justify-content:flex-end;">
        <div style="display:flex;gap:0.4rem;">
          <button class="btn btn-sm tx-range-btn active" onclick="setTxRange('all', event)">All</button>
          <button class="btn btn-sm tx-range-btn" onclick="setTxRange('month', event)">This Month</button>
          <button class="btn btn-sm tx-range-btn" onclick="setTxRange('custom', event)">Custom</button>
        </div>
        <button class="btn btn-primary" onclick="openModal()">+ Add</button>
      </div>
    </div>

    <!-- CUSTOM DATE RANGE (hidden by default) -->
    <div id="tx-custom-range" style="display:none;gap:0.75rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap;" class="filters-bar">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <label style="font-size:12px;color:var(--text3);font-family:var(--mono);">FROM</label>
        <input class="form-input" type="date" id="filter-start" style="width:155px;padding:0.4rem 0.75rem;font-size:13px;">
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <label style="font-size:12px;color:var(--text3);font-family:var(--mono);">TO</label>
        <input class="form-input" type="date" id="filter-end" style="width:155px;padding:0.4rem 0.75rem;font-size:13px;">
      </div>
      <button class="btn btn-primary btn-sm" onclick="applyTxCustomRange()">Apply</button>
      <button class="btn btn-sm" onclick="clearFilters()">Clear</button>
    </div>

    <!-- FILTER BAR: labeled dropdowns in a card -->
    <div class="card" style="padding:0.875rem 1.25rem;margin-bottom:1rem;">
      <div style="display:flex;gap:2rem;align-items:flex-end;flex-wrap:wrap;">

        <div>
          <div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.35rem;">Sort by</div>
          <select class="form-select" id="sort-by" onchange="loadTransactions()" style="width:130px;padding:0.4rem 0.75rem;font-size:13px;">
            <option value="date">Date</option>
            <option value="amount">Amount</option>
            <option value="type">Type</option>
            <option value="category">Category</option>
          </select>
        </div>

        <div>
          <div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.35rem;">Type</div>
          <select class="form-select" id="filter-type" onchange="currentPage=1; loadTransactions()" style="width:130px;padding:0.4rem 0.75rem;font-size:13px;">
            <option value="">All Types</option>
            <option value="cr">Credit</option>
            <option value="db">Debit</option>
          </select>
        </div>

        <div>
          <div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.35rem;">Order</div>
          <select class="form-select" id="sort-order" onchange="loadTransactions()" style="width:120px;padding:0.4rem 0.75rem;font-size:13px;">
            <option value="desc">Descending</option>
            <option value="asc">Ascending</option>
          </select>
        </div>

        <!-- vertical divider -->
        <div style="width:1px;height:36px;background:var(--border);align-self:flex-end;margin-bottom:1px;"></div>

        <div>
          <div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.35rem;">Per page</div>
          <select class="form-select" id="page-limit" onchange="currentPage=1; loadTransactions()" style="width:110px;padding:0.4rem 0.75rem;font-size:13px;">
            <option value="15">15</option>
            <option value="30">30</option>
            <option value="50">50</option>
          </select>
        </div>

      </div>
    </div>

    <!-- TABLE -->
    <div class="card" style="padding:0;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Date</th><th>Time</th><th>Amount</th><th>Type</th><th>Category</th><th>Description</th><th></th>
            </tr>
          </thead>
          <tbody id="tx-tbody">
            <tr><td colspan="8"><div class="loading"><div class="spinner"></div> loading...</div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

  </main>
</div>

<!-- ADD TRANSACTION MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Transaction</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="tx-date" required>
      </div>
      <div class="form-group">
        <label class="form-label">Time</label>
        <input class="form-input" type="time" id="tx-time">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Amount (₹)</label>
      <input class="form-input" type="number" step="0.01" id="tx-amount" placeholder="0.00" required>
    </div>

    <div class="form-group">
      <label class="form-label">Type</label>
      <div class="radio-group">
        <label class="radio-option" id="opt-cr" onclick="selectType('cr')">
          <input type="radio" name="tx-type" value="cr"> Credit
        </label>
        <label class="radio-option" id="opt-db" onclick="selectType('db')">
          <input type="radio" name="tx-type" value="db"> Debit
        </label>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="tx-category">
        <option value="">Select category</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="tx-desc" rows="2" maxlength="255" placeholder="optional note..."></textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
      <button class="btn" onclick="closeModal()" style="flex:1;justify-content:center;">Cancel</button>
      <button class="btn btn-primary" onclick="submitTransaction()" style="flex:1;justify-content:center;">Add</button>
    </div>
    <div id="tx-error" style="color:var(--red);font-size:12px;font-family:var(--mono);margin-top:0.5rem;text-align:center;"></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="app.js"></script>
<script>
const user = requireAuth();
document.getElementById('sidebar').innerHTML = renderSidebar('transactions');

let currentPage = 1;
let totalPages = 1;
let selectedType = '';
let categories = [];
let txStartDate = null;
let txEndDate = null;

function setTxRange(type, event) {
  document.querySelectorAll('.tx-range-btn').forEach(b => b.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  document.getElementById('tx-custom-range').style.display = 'none';

  const now = new Date();
  const pad = n => String(n).padStart(2, '0');

  if (type === 'all') {
    txStartDate = null; txEndDate = null;
    currentPage = 1; loadTransactions();
  } else if (type === 'month') {
    txStartDate = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
    const last = new Date(now.getFullYear(), now.getMonth()+1, 0);
    txEndDate = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(last.getDate())}`;
    currentPage = 1; loadTransactions();
  } else if (type === 'custom') {
    document.getElementById('tx-custom-range').style.display = 'flex';
  }
}

function applyTxCustomRange() {
  const start = document.getElementById('filter-start').value;
  const end = document.getElementById('filter-end').value;
  if (!start || !end) return;
  txStartDate = start; txEndDate = end;
  currentPage = 1; loadTransactions();
}

function clearFilters() {
  document.getElementById('filter-start').value = '';
  document.getElementById('filter-end').value = '';
  document.getElementById('filter-type').value = '';
  document.getElementById('tx-custom-range').style.display = 'none';
  document.querySelectorAll('.tx-range-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tx-range-btn').classList.add('active');
  txStartDate = null; txEndDate = null;
  currentPage = 1; loadTransactions();
}

async function loadTransactions() {
  const sortBy = document.getElementById('sort-by').value;
  const sortOrder = document.getElementById('sort-order').value;
  const limit = document.getElementById('page-limit').value;
  const filterType = document.getElementById('filter-type').value;
  const tbody = document.getElementById('tx-tbody');
  tbody.innerHTML = '<tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>';

  const params = new URLSearchParams({ sort_by: sortBy, sort_order: sortOrder, limit, page: currentPage });
  if (filterType) params.set('t_type', filterType);
  if (txStartDate) params.set('start_date', txStartDate);
  if (txEndDate) params.set('end_date', txEndDate);

  try {
    const data = await apiFetch(`/api/transactions?${params.toString()}`);
    const txs = Array.isArray(data) ? data : data.transactions || [];
    totalPages = data.total_pages || 1;
    document.getElementById('tx-count-sub').textContent = `${txs.length} entries`;

    if (!txs.length) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">no transactions found</div></td></tr>';
    } else {
      tbody.innerHTML = txs.map((t, i) => {
        const isDebit = t.type === 'db';
        const amountDisplay = isDebit ? `-₹${formatRupees(t.amount)}` : `₹${formatRupees(t.amount)}`;
        return `
        <tr>
          <td style="font-family:var(--mono);font-size:12px;color:var(--text3)">${((currentPage-1)*parseInt(limit))+i+1}</td>
          <td style="font-family:var(--mono);font-size:12px">${t.date}</td>
          <td style="font-family:var(--mono);font-size:12px;color:var(--text3)">${t.time || '—'}</td>
          <td style="font-family:var(--mono);font-weight:500;color:${isDebit ? 'var(--red)' : 'var(--accent)'}">${amountDisplay}</td>
          <td><span class="badge badge-${t.type}">${t.type==='cr'?'Credit':'Debit'}</span></td>
          <td>${t.category}</td>
          <td style="color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description||'—'}</td>
          <td><button class="btn btn-danger" onclick="deleteTransaction(${t.id})">Delete</button></td>
        </tr>`;
      }).join('');
    }
    renderPagination();
  } catch(e) {
    if (e.status === 401) { clearUser(); window.location.href = 'index.html'; }
  }
}

function renderPagination() {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || Math.abs(p - currentPage) <= 1) {
      html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    } else if (Math.abs(p - currentPage) === 2) {
      html += `<span style="color:var(--text3);font-size:12px">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  el.innerHTML = html;
}

function goPage(p) {
  if (p < 1 || p > totalPages) return;
  currentPage = p; loadTransactions();
}

async function loadCategories() {
  try {
    categories = await apiFetch('/api/categories');
    const sel = document.getElementById('tx-category');
    sel.innerHTML = '<option value="">Select category</option>' +
      categories.map(c => `<option value="${c.category_id}">${c.category}</option>`).join('');
  } catch(e) {}
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('tx-date').valueAsDate = new Date();
  document.getElementById('tx-error').textContent = '';
  loadCategories();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  selectedType = '';
  document.getElementById('opt-cr').className = 'radio-option';
  document.getElementById('opt-db').className = 'radio-option';
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-desc').value = '';
  document.getElementById('tx-category').value = '';
}

function selectType(type) {
  selectedType = type;
  document.getElementById('opt-cr').className = 'radio-option' + (type==='cr'?' selected-cr':'');
  document.getElementById('opt-db').className = 'radio-option' + (type==='db'?' selected-db':'');
}

async function submitTransaction() {
  const date = document.getElementById('tx-date').value;
  const time = document.getElementById('tx-time').value;
  const amount = document.getElementById('tx-amount').value;
  const category_id = document.getElementById('tx-category').value;
  const description = document.getElementById('tx-desc').value;
  const err = document.getElementById('tx-error');
  err.textContent = '';
  if (!date || !amount || !selectedType || !category_id) { err.textContent = 'please fill all required fields'; return; }
  try {
    await apiFetch('/api/transactions', {
      method: 'POST',
      body: JSON.stringify({ date, time, amount, t_type: selectedType, category_id, description })
    });
    closeModal(); toast('transaction added'); loadTransactions();
  } catch(e) {
    err.textContent = e.message || 'failed to add transaction';
  }
}

async function deleteTransaction(id) {
  if (!confirm('delete this transaction?')) return;
  try {
    await apiFetch(`/api/transactions/${id}`, { method: 'DELETE' });
    toast('transaction deleted'); loadTransactions();
  } catch(e) {
    toast(e.message || 'failed to delete', 'error');
  }
}

const style = document.createElement('style');
style.textContent = `.tx-range-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }`;
document.head.appendChild(style);

loadTransactions();
</script>
</body>
</html>
