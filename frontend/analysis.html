<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFT — Analysis</title>
<link rel="stylesheet" href="/frontend/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>

<!-- Mobile hamburger -->
<button class="mobile-menu-btn" id="hamburger" onclick="toggleSidebar()">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8">
    <path d="M2 4h14M2 9h14M2 14h14"/>
  </svg>
</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="app-layout">
  <div id="sidebar"></div>
  <main class="main-content">

    <!-- PAGE HEADER -->
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
      <div>
        <div class="page-title">Analysis</div>
        <!-- Prominent range indicator -->
        <div class="range-indicator" id="range-indicator">all time</div>
      </div>

      <!-- DATE RANGE CONTROLS -->
      <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
        <div class="filters-bar" style="margin:0;">
          <button class="btn btn-sm range-btn active" onclick="setRange('all', event)">All Time</button>

          <!-- Year dropdown -->
          <div style="position:relative;display:inline-block;">
            <select class="btn btn-sm range-btn" id="year-select" onchange="setRange('year', event)" style="cursor:pointer;appearance:none;padding-right:1.5rem;">
              <option value="">Year</option>
            </select>
            <span style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text3);font-size:10px;">▼</span>
          </div>

          <!-- Month dropdown -->
          <div style="position:relative;display:inline-block;">
            <select class="btn btn-sm range-btn" id="month-select" onchange="setRange('month', event)" style="cursor:pointer;appearance:none;padding-right:1.5rem;">
              <option value="">Month</option>
            </select>
            <span style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text3);font-size:10px;">▼</span>
          </div>

          <button class="btn btn-sm range-btn" onclick="setRange('custom', event)">Custom</button>
        </div>
      </div>
    </div>

    <!-- CUSTOM DATE RANGE -->
    <div id="custom-range" style="display:none;gap:0.75rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;" class="filters-bar">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <label style="font-size:12px;color:var(--text3);font-family:var(--mono);">FROM</label>
        <input class="form-input" type="date" id="custom-start" style="width:160px;padding:0.4rem 0.75rem;font-size:13px;">
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <label style="font-size:12px;color:var(--text3);font-family:var(--mono);">TO</label>
        <input class="form-input" type="date" id="custom-end" style="width:160px;padding:0.4rem 0.75rem;font-size:13px;">
      </div>
      <button class="btn btn-primary btn-sm" onclick="applyCustomRange()">Apply</button>
    </div>

    <!-- NO DATA BANNER -->
    <div id="no-data-banner" style="display:none;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:var(--radius);padding:0.6rem 1rem;margin-bottom:1.25rem;font-size:13px;font-family:var(--mono);color:var(--amber);">
      no data for the selected period
    </div>

    <!-- TOTALS -->
    <div class="stats-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:1.5rem;">
      <div class="stat-card income"><div class="stat-label">Total Income</div><div class="stat-value" id="a-income">—</div></div>
      <div class="stat-card expense"><div class="stat-label">Total Expense</div><div class="stat-value" id="a-expense">—</div></div>
      <div class="stat-card net-pos" id="a-net-card">
        <div class="stat-label">Net Balance</div>
        <div class="stat-value" id="a-net">—</div>
      </div>
    </div>

    <!-- INCOME/EXPENSE BAR + NET SAVINGS LINE — side by side -->
    <div class="analysis-charts-row" style="display:grid;grid-template-columns:1.4fr 1fr;gap:12px;margin-bottom:1.5rem;">

      <div class="card">
        <div class="section-header">
          <div class="section-title">Monthly Income vs Expense</div>
        </div>
        <div class="chart-container" style="height:260px;">
          <canvas id="monthly-chart"></canvas>
        </div>
      </div>

      <!-- 3-line net savings chart -->
      <div class="card">
        <div class="section-header">
          <div class="section-title">Net Savings</div>
          <div style="display:flex;gap:10px;font-size:11px;font-family:var(--mono);align-items:center;">
            <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:2px;background:#34d399;display:inline-block;border-radius:2px;"></span>income</span>
            <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:2px;background:#fb923c;display:inline-block;border-radius:2px;"></span>expense</span>
            <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:2px;background:#60a5fa;display:inline-block;border-radius:2px;"></span>net</span>
          </div>
        </div>
        <div class="chart-container" style="height:260px;">
          <canvas id="net-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- CATEGORY CARDS — expense + income, side by side -->
    <div class="cat-cards-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem;">

      <!-- Expense by Category -->
      <div class="card">
        <div class="section-header" style="margin-bottom:1rem;">
          <div class="section-title">Expense by Category</div>
          <span id="exp-total-label" style="font-size:12px;font-family:var(--mono);color:var(--text3)"></span>
        </div>
        <div class="cat-card-inner">
          <div class="cat-donut-wrap">
            <canvas id="exp-donut"></canvas>
            <div id="exp-donut-empty" style="display:none;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-family:var(--mono);font-size:12px;">no data</div>
          </div>
          <div class="cat-bars-wrap" id="exp-cat-list"></div>
        </div>
      </div>

      <!-- Income by Category -->
      <div class="card">
        <div class="section-header" style="margin-bottom:1rem;">
          <div class="section-title">Income by Category</div>
          <span id="inc-total-label" style="font-size:12px;font-family:var(--mono);color:var(--text3)"></span>
        </div>
        <div class="cat-card-inner">
          <div class="cat-donut-wrap">
            <canvas id="inc-donut"></canvas>
            <div id="inc-donut-empty" style="display:none;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-family:var(--mono);font-size:12px;">no data</div>
          </div>
          <div class="cat-bars-wrap" id="inc-cat-list"></div>
        </div>
      </div>
    </div>

    <!-- SUMMARY TABLE -->
    <div class="card" style="padding:0;">
      <div style="padding:1.25rem 1.25rem 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;">
        <div class="section-title">Summary Table</div>
        <div style="display:flex;gap:0.4rem;">
          <button class="btn btn-sm period-btn active" onclick="setPeriod('monthly', event)">Monthly</button>
          <button class="btn btn-sm period-btn" onclick="setPeriod('weekly', event)">Weekly</button>
          <button class="btn btn-sm period-btn" onclick="setPeriod('yearly', event)">Yearly</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="summary-thead">
            <tr><th>Month</th><th>Income</th><th>Expense</th><th>Net</th><th>Savings Rate</th></tr>
          </thead>
          <tbody id="monthly-tbody">
            <tr><td colspan="5"><div class="loading"><div class="spinner"></div> loading...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="/frontend/app.js"></script>
<script>
const user = requireAuth();
document.getElementById('sidebar').innerHTML = renderSidebar('analysis');

const MONTH_NAMES = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CHART_DEFAULTS = {
  color: '#8b909e',
  grid: 'rgba(255,255,255,0.05)',
  font: "'DM Mono', monospace"
};
const CAT_COLORS = ['#34d399','#fb923c','#60a5fa','#fbbf24','#a78bfa','#e879f9','#22d3ee','#f472b6','#818cf8'];

let currentRange = { start_date: null, end_date: null };
let currentPeriod = 'monthly';
let monthlyChart = null;
let netChart = null;
let expDonut = null;
let incDonut = null;

// ---- POPULATE YEAR/MONTH DROPDOWNS ----
async function populateDropdowns() {
  try {
    const monthly = await apiFetch('/api/analysis/monthly');
    const years = [...new Set(monthly.map(m => m.year))].sort((a,b) => b-a);

    const yearSel = document.getElementById('year-select');
    years.forEach(y => {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = y;
      yearSel.appendChild(opt);
    });

    const monthSel = document.getElementById('month-select');
    monthly.forEach(m => {
      const opt = document.createElement('option');
      opt.value = `${m.year}-${m.month}`;
      opt.textContent = `${MONTH_NAMES[parseInt(m.month)]} ${m.year}`;
      monthSel.appendChild(opt);
    });
  } catch(e) {}
}

// ---- RANGE HELPERS ----
function setRange(type, event) {
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  document.getElementById('custom-range').style.display = 'none';

  const pad = n => String(n).padStart(2, '0');
  const indicator = document.getElementById('range-indicator');

  if (type === 'all') {
    currentRange = { start_date: null, end_date: null };
    indicator.textContent = 'all time';
    document.getElementById('year-select').value = '';
    document.getElementById('month-select').value = '';

  } else if (type === 'year') {
    const val = document.getElementById('year-select').value;
    if (!val) return;
    currentRange = { start_date: `${val}-01-01`, end_date: `${val}-12-31` };
    indicator.textContent = `year ${val}`;

  } else if (type === 'month') {
    const val = document.getElementById('month-select').value;
    if (!val) return;
    const [y, m] = val.split('-');
    const first = `${y}-${m}-01`;
    const last = new Date(parseInt(y), parseInt(m), 0);
    const lastStr = `${y}-${m}-${pad(last.getDate())}`;
    currentRange = { start_date: first, end_date: lastStr };
    indicator.textContent = `${MONTH_NAMES[parseInt(m)]} ${y}`;

  } else if (type === 'custom') {
    document.getElementById('custom-range').style.display = 'flex';
    return;
  }

  loadAnalysis();
}

function applyCustomRange() {
  const start = document.getElementById('custom-start').value;
  const end = document.getElementById('custom-end').value;
  if (!start || !end) return;
  currentRange = { start_date: start, end_date: end };
  document.getElementById('range-indicator').textContent = `${start} → ${end}`;
  loadAnalysis();
}

// ---- PERIOD TOGGLE ----
function setPeriod(period, event) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  loadSummaryTable();
}

// ---- CATEGORY BAR ITEM ----
function categoryBar(label, value, total, color) {
  const pct = total > 0 ? Math.round((parseFloat(value) / parseFloat(total)) * 100) : 0;
  return `
    <div style="margin-bottom:0.75rem;">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
        <span style="font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%">${label}</span>
        <span style="font-size:11px;font-family:var(--mono);color:var(--text3);white-space:nowrap;">${pct}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
      </div>
    </div>`;
}

// ---- BUILD CATEGORY DONUT ----
function buildCatDonut(canvasId, emptyId, data, type) {
  const filtered = data.filter(c => parseFloat(c[type]) > 0)
                       .sort((a,b) => parseFloat(b[type]) - parseFloat(a[type]));

  const canvas = document.getElementById(canvasId);
  const emptyEl = document.getElementById(emptyId);

  // destroy previous instance
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();

  if (!filtered.length) {
    canvas.style.display = 'none';
    emptyEl.style.display = 'flex';
    return;
  }

  canvas.style.display = 'block';
  emptyEl.style.display = 'none';

  new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: filtered.map(c => c.category),
      datasets: [{
        data: filtered.map(c => parseFloat(c[type]).toFixed(2)),
        backgroundColor: CAT_COLORS.slice(0, filtered.length),
        borderWidth: 0,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },   /* legend replaced by progress bars */
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ₹${formatRupees(ctx.raw)}`
          }
        }
      },
      cutout: '62%'
    }
  });
}

// ---- BUILD QUERY STRING ----
function rangeParams() {
  const p = new URLSearchParams();
  if (currentRange.start_date) p.set('start_date', currentRange.start_date);
  if (currentRange.end_date) p.set('end_date', currentRange.end_date);
  return p.toString() ? '?' + p.toString() : '';
}

// ---- SUMMARY TABLE ----
async function loadSummaryTable() {
  const tbody = document.getElementById('monthly-tbody');
  const thead = document.getElementById('summary-thead');
  tbody.innerHTML = '<tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr>';

  try {
    const data = await apiFetch(`/api/analysis/${currentPeriod}${rangeParams()}`);

    if (!data || !data.length) {
      thead.innerHTML = '<tr><th colspan="5"></th></tr>';
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">no data for this period</div></td></tr>';
      return;
    }

    if (currentPeriod === 'monthly') {
      thead.innerHTML = '<tr><th>Month</th><th>Income</th><th>Expense</th><th>Net</th><th>Savings Rate</th></tr>';
      tbody.innerHTML = data.map(m => {
        const net = parseFloat(m.net);
        const income = parseFloat(m.income);
        const savingsRate = income > 0 ? Math.round((net / income) * 100) : 0;
        const netColor = net >= 0 ? 'var(--accent)' : 'var(--red)';
        return `<tr>
          <td class="primary" style="font-family:var(--mono)">${MONTH_NAMES[parseInt(m.month)]} ${m.year}</td>
          <td style="font-family:var(--mono);color:var(--accent)">₹${formatRupees(m.income)}</td>
          <td style="font-family:var(--mono);color:var(--red)">₹${formatRupees(m.expense)}</td>
          <td style="font-family:var(--mono);color:${netColor};font-weight:500">₹${formatRupees(m.net)}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="progress-bar" style="width:80px;margin:0;">
                <div class="progress-fill" style="width:${Math.max(0,savingsRate)}%;background:${netColor}"></div>
              </div>
              <span style="font-family:var(--mono);font-size:12px;color:${netColor}">${savingsRate}%</span>
            </div>
          </td>
        </tr>`;
      }).join('');

    } else if (currentPeriod === 'weekly') {
      thead.innerHTML = '<tr><th>Period</th><th>Week</th><th>Income</th><th>Expense</th><th>Net</th></tr>';
      tbody.innerHTML = data.map(w => {
        const net = parseFloat(w.net);
        const netColor = net >= 0 ? 'var(--accent)' : 'var(--red)';
        return `<tr>
          <td style="font-family:var(--mono);color:var(--text3)">${MONTH_NAMES[parseInt(w.month)]} ${w.year}</td>
          <td class="primary" style="font-family:var(--mono)">Week ${w.week_of_month}</td>
          <td style="font-family:var(--mono);color:var(--accent)">₹${formatRupees(w.income)}</td>
          <td style="font-family:var(--mono);color:var(--red)">₹${formatRupees(w.expense)}</td>
          <td style="font-family:var(--mono);color:${netColor};font-weight:500">₹${formatRupees(w.net)}</td>
        </tr>`;
      }).join('');

    } else if (currentPeriod === 'yearly') {
      thead.innerHTML = '<tr><th>Year</th><th>Income</th><th>Expense</th><th>Net</th><th>Savings Rate</th></tr>';
      tbody.innerHTML = data.map(y => {
        const net = parseFloat(y.net);
        const income = parseFloat(y.income);
        const savingsRate = income > 0 ? Math.round((net / income) * 100) : 0;
        const netColor = net >= 0 ? 'var(--accent)' : 'var(--red)';
        return `<tr>
          <td class="primary" style="font-family:var(--mono)">${y.year}</td>
          <td style="font-family:var(--mono);color:var(--accent)">₹${formatRupees(y.income)}</td>
          <td style="font-family:var(--mono);color:var(--red)">₹${formatRupees(y.expense)}</td>
          <td style="font-family:var(--mono);color:${netColor};font-weight:500">₹${formatRupees(y.net)}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="progress-bar" style="width:80px;margin:0;">
                <div class="progress-fill" style="width:${Math.max(0,savingsRate)}%;background:${netColor}"></div>
              </div>
              <span style="font-family:var(--mono);font-size:12px;color:${netColor}">${savingsRate}%</span>
            </div>
          </td>
        </tr>`;
      }).join('');
    }
  } catch(e) {
    if (e.status === 401) { clearUser(); window.location.href = '/frontend/index.html'; }
  }
}

// ---- MAIN LOAD ----
async function loadAnalysis() {
  const qs = rangeParams();
  document.getElementById('no-data-banner').style.display = 'none';

  try {
    const [totals, monthly, cats] = await Promise.all([
      apiFetch('/api/analysis' + qs),
      apiFetch('/api/analysis/monthly' + qs),
      apiFetch('/api/analysis/categories' + qs)
    ]);

    const hasData = parseFloat(totals.total_income) > 0 || parseFloat(totals.total_expense) > 0;
    if (!hasData) document.getElementById('no-data-banner').style.display = 'block';

    // Totals
    document.getElementById('a-income').textContent = '₹' + formatRupees(totals.total_income);
    document.getElementById('a-expense').textContent = '₹' + formatRupees(totals.total_expense);
    const net = parseFloat(totals.net);
    const arrow = net >= 0 ? '↑' : '↓';
    const netColor = net >= 0 ? 'var(--accent)' : 'var(--red)';
    document.getElementById('a-net').innerHTML = `<span style="color:${netColor}">₹${formatRupees(totals.net)} ${arrow}</span>`;
    document.getElementById('a-net-card').className = 'stat-card ' + (net >= 0 ? 'net-pos' : 'net-neg');

    // Destroy old charts
    if (monthlyChart) { monthlyChart.destroy(); monthlyChart = null; }
    if (netChart) { netChart.destroy(); netChart = null; }

    if (monthly.length) {
      const sorted = [...monthly].reverse();
      const labels = sorted.map(m => MONTH_NAMES[parseInt(m.month)] + "'" + m.year.slice(2));

      // Bar chart
      monthlyChart = new Chart(document.getElementById('monthly-chart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Income',
              data: sorted.map(m => parseFloat(m.income).toFixed(2)),
              backgroundColor: 'rgba(52,211,153,0.75)',
              borderRadius: 4
            },
            {
              label: 'Expense',
              data: sorted.map(m => parseFloat(m.expense).toFixed(2)),
              backgroundColor: 'rgba(251,146,60,0.75)',
              borderRadius: 4
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: CHART_DEFAULTS.color, font: { family: CHART_DEFAULTS.font, size: 11 }, boxWidth: 10 } },
            tooltip: { callbacks: { label: ctx => ` ₹${formatRupees(ctx.raw)}` } }
          },
          scales: {
            x: { ticks: { color: CHART_DEFAULTS.color, font: { family: CHART_DEFAULTS.font, size: 10 } }, grid: { color: CHART_DEFAULTS.grid } },
            y: { ticks: { color: CHART_DEFAULTS.color, font: { family: CHART_DEFAULTS.font, size: 10 }, callback: v => '₹' + v }, grid: { color: CHART_DEFAULTS.grid } }
          }
        }
      });

      // 3-line chart: income, expense, net
      netChart = new Chart(document.getElementById('net-chart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Income',
              data: sorted.map(m => parseFloat(m.income).toFixed(2)),
              borderColor: '#34d399',
              backgroundColor: 'rgba(52,211,153,0.06)',
              fill: false,
              tension: 0.4,
              pointRadius: 3,
              pointBackgroundColor: '#34d399',
              borderWidth: 2
            },
            {
              label: 'Expense',
              data: sorted.map(m => parseFloat(m.expense).toFixed(2)),
              borderColor: '#fb923c',
              backgroundColor: 'rgba(251,146,60,0.06)',
              fill: false,
              tension: 0.4,
              pointRadius: 3,
              pointBackgroundColor: '#fb923c',
              borderWidth: 2
            },
            {
              label: 'Net',
              data: sorted.map(m => parseFloat(m.net).toFixed(2)),
              borderColor: '#60a5fa',
              backgroundColor: 'rgba(96,165,250,0.08)',
              fill: true,
              tension: 0.4,
              pointRadius: 3,
              pointBackgroundColor: '#60a5fa',
              borderWidth: 2
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },  /* we use custom legend in header */
            tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ₹${formatRupees(ctx.raw)}` } }
          },
          scales: {
            x: { ticks: { color: CHART_DEFAULTS.color, font: { family: CHART_DEFAULTS.font, size: 10 } }, grid: { color: CHART_DEFAULTS.grid } },
            y: { ticks: { color: CHART_DEFAULTS.color, font: { family: CHART_DEFAULTS.font, size: 10 }, callback: v => '₹' + v }, grid: { color: CHART_DEFAULTS.grid } }
          }
        }
      });
    }

    // ---- CATEGORY CARDS ----
    const totalExp = cats.reduce((s, c) => s + parseFloat(c.expense), 0);
    const totalInc = cats.reduce((s, c) => s + parseFloat(c.income), 0);

    const expCats = cats.filter(c => parseFloat(c.expense) > 0).sort((a,b) => parseFloat(b.expense) - parseFloat(a.expense));
    const incCats = cats.filter(c => parseFloat(c.income) > 0).sort((a,b) => parseFloat(b.income) - parseFloat(a.income));

    // Expense total label
    document.getElementById('exp-total-label').textContent = totalExp > 0 ? '₹' + formatRupees(totalExp) : '';
    document.getElementById('inc-total-label').textContent = totalInc > 0 ? '₹' + formatRupees(totalInc) : '';

    // Expense donut + bars
    buildCatDonut('exp-donut', 'exp-donut-empty', cats, 'expense');
    document.getElementById('exp-cat-list').innerHTML = expCats.length
      ? expCats.map((c, i) => categoryBar(c.category, c.expense, totalExp, CAT_COLORS[i % CAT_COLORS.length])).join('')
      : '<div style="color:var(--text3);font-size:12px;font-family:var(--mono);padding:0.5rem 0;">no expense data</div>';

    // Income donut + bars
    buildCatDonut('inc-donut', 'inc-donut-empty', cats, 'income');
    document.getElementById('inc-cat-list').innerHTML = incCats.length
      ? incCats.map((c, i) => categoryBar(c.category, c.income, totalInc, CAT_COLORS[i % CAT_COLORS.length])).join('')
      : '<div style="color:var(--text3);font-size:12px;font-family:var(--mono);padding:0.5rem 0;">no income data</div>';

    loadSummaryTable();

  } catch(e) {
    if (e.status === 401) { clearUser(); window.location.href = '/frontend/index.html'; }
  }
}

// Button active styles
const style = document.createElement('style');
style.textContent = `
  .range-btn.active  { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  .period-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  select.range-btn   { background: var(--bg3); color: var(--text); }
  select.range-btn.active { background: var(--accent); color: #0d1117; }
`;
document.head.appendChild(style);

populateDropdowns();
loadAnalysis();
</script>
